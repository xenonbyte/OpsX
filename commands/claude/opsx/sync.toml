description = "Sync delta specs from a change to main specs"
prompt = """
# OPSX: Sync

Sync delta specs from a change to main specs.

## Language Preference
Before responding, read `~/.openspec/.opsx-config.yaml`.
- If `language: zh` → respond in Chinese (简体中文)
- If `language: en` or missing → respond in English

## Input

Optionally specify a change name after `/opsx:sync`. If omitted, prompt for selection.

## Steps

1. **If no change name provided, prompt for selection**
   - List directories under `openspec/changes/` (excluding `archive/`)
   - Show changes that have delta specs (under `specs/` directory)

2. **Find delta specs**
   - Look for delta spec files in `openspec/changes/<name>/specs/*/spec.md`
   - Each delta spec contains: `## ADDED Requirements`, `## MODIFIED Requirements`, `## REMOVED Requirements`, `## RENAMED Requirements`

3. **For each delta spec, apply changes to main specs**:
   - **ADDED**: Add new requirement blocks to main spec
   - **MODIFIED**: Find existing requirement and apply changes
   - **REMOVED**: Remove requirement block from main spec
   - **RENAMED**: Rename requirement from old title to new title

4. **Show summary**:
   - Which capabilities were updated
   - What changes were made (requirements added/modified/removed/renamed)

## Delta Spec Format Reference

```markdown
## ADDED Requirements
### Requirement: New Feature
The system SHALL do something new.

## MODIFIED Requirements
### Requirement: Existing Feature
#### Scenario: New scenario to add

## REMOVED Requirements
### Requirement: Deprecated Feature

## RENAMED Requirements
- FROM: `### Requirement: Old Name`
- TO: `### Requirement: New Name`
```
"""
